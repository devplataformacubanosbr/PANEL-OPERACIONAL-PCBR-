<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Right Leg (Darker, behind) -->
  <path d="M 50 10 L 75 90 L 100 90 L 60 10 Z" fill="#5b21b6" />

  <!-- Left Leg 3D (Front Face) -->
