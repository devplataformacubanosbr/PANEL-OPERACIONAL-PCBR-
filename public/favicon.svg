    <!-- Middle Disk -->
    <path d="M 29 58 v 14 a 21 7 0 0 0 42 0 v -14 Z" fill="#4c1d95" />
    <ellipse cx="50" cy="58" rx="21" ry="7" fill="#8b5cf6" />

    <!-- Top Disk -->
    <path d="M 29 42 v 14 a 21 7 0 0 0 42 0 v -14 Z" fill="#4c1d95" />
    <ellipse cx="50" cy="42" rx="21" ry="7" fill="#a855f7" />
  </g>
</svg>